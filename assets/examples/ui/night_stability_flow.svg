  <text x="100" y="180" fill="#7dd3fc" font-size="36" font-family="Arial">1. Night mode</text>
  <text x="100" y="240" fill="#d1d5db" font-size="30" font-family="Arial">Select mode at bottom</text>
  <text x="490" y="180" fill="#86efac" font-size="36" font-family="Arial">2. Hold still</text>
